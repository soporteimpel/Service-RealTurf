# Cloud Build — despliegue en Google Cloud Run
# Mismo patrón que Service-Musas-wompi
steps:
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/realturf-facebook-webhook:$SHORT_SHA'
      - '-t'
      - 'gcr.io/$PROJECT_ID/realturf-facebook-webhook:latest'
      - '.'

  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'gcr.io/$PROJECT_ID/realturf-facebook-webhook:$SHORT_SHA'

  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'gcr.io/$PROJECT_ID/realturf-facebook-webhook:latest'

  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'realturf-facebook-webhook'
      - '--image'
      - 'gcr.io/$PROJECT_ID/realturf-facebook-webhook:$SHORT_SHA'
      - '--region'
      - 'us-central1'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'

images:
  - 'gcr.io/$PROJECT_ID/realturf-facebook-webhook:$SHORT_SHA'
  - 'gcr.io/$PROJECT_ID/realturf-facebook-webhook:latest'

options:
  logging: CLOUD_LOGGING_ONLY
